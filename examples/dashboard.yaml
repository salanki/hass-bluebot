# Example Home Assistant dashboard for Bluebot Water Meter.
#
# Generic — replace the `sensor.<meter>_*` / `binary_sensor.<meter>_flowing`
# entity ids with your own meter names (Settings → Devices & Services → Bluebot).
#
# "Today" is a native sensor from the integration (the meter's own daily rollup),
# so no utility_meter helper is needed. The daily-usage graph uses a
# statistics-graph card on the cumulative `total_volume` sensor (stat_types:
# change), which HA derives automatically from long-term statistics.
#
# Paste into a dashboard in raw-config (edit dashboard → ⋮ → "Edit in YAML").

title: Water
views:
  - title: Water
    path: water
    type: sections
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Pool HX
            icon: mdi:pool
          - type: gauge
            entity: sensor.pool_hx_flow_rate
            name: Flow rate
            needle: true
            min: 0
            max: 30
            severity: { green: 0, yellow: 20, red: 27 }
          - type: tile
            entity: binary_sensor.pool_hx_flowing
            name: Flowing
          - type: tile
            entity: sensor.pool_hx_today
            name: Today
          - type: tile
            entity: sensor.pool_hx_total_volume
            name: Total
          - type: statistics-graph
            title: Water per day (gal)
            chart_type: bar
            period: day
            days_to_show: 30
            stat_types: [change]
            entities:
              - sensor.pool_hx_total_volume

      - type: grid
        cards:
          - type: heading
            heading: Pool Auto Fill
            icon: mdi:water-plus
          - type: gauge
            entity: sensor.pool_auto_fill_flow_rate
            name: Flow rate
            needle: true
            min: 0
            max: 30
            severity: { green: 0, yellow: 20, red: 27 }
          - type: tile
            entity: binary_sensor.pool_auto_fill_flowing
            name: Flowing
          - type: tile
            entity: sensor.pool_auto_fill_today
            name: Today
          - type: tile
            entity: sensor.pool_auto_fill_total_volume
            name: Total
          - type: statistics-graph
            title: Water per day (gal)
            chart_type: bar
            period: day
            days_to_show: 30
            stat_types: [change]
            entities:
              - sensor.pool_auto_fill_total_volume

      - type: grid
        cards:
          - type: heading
            heading: Water Heater
            icon: mdi:water-boiler
          - type: gauge
            entity: sensor.water_heater_flow_rate
            name: Flow rate
            needle: true
            min: 0
            max: 30
            severity: { green: 0, yellow: 20, red: 27 }
          - type: tile
            entity: binary_sensor.water_heater_flowing
            name: Flowing
          - type: tile
            entity: sensor.water_heater_today
            name: Today
          - type: tile
            entity: sensor.water_heater_total_volume
            name: Total
          - type: statistics-graph
            title: Water per day (gal)
            chart_type: bar
            period: day
            days_to_show: 30
            stat_types: [change]
            entities:
              - sensor.water_heater_total_volume
